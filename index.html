<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hindustani Property</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #ff6600;
    }

    .search {
      width: 50%;
      padding: 8px;
    }

    .hero {
      text-align: center;
      padding: 30px;
      background: white;
    }

    .hero input {
      padding: 10px;
      width: 60%;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-body {
      padding: 10px;
    }

    .price {
      font-weight: bold;
      color: green;
    }

    .btn {
      display: inline-block;
      margin-top: 5px;
      padding: 5px 10px;
      background: #ff6600;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .post-btn {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    .form-container {
      display: none;
      padding: 20px;
      background: white;
    }

    .form-container input, .form-container textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="hindustaniproperty.png" alt="logo">
  </div>
  <input type="text" id="search" class="search" placeholder="Search city...">
</header>

<section class="hero">
  <h2>Find Your Dream Property</h2>
  <button class="post-btn" onclick="showForm()">Post Property FREE</button>
</section>

<div class="form-container" id="form">
  <h3>Post Property</h3>
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="phone" placeholder="Phone">
  <input type="text" id="city" placeholder="City">
  <input type="text" id="price" placeholder="Price">
  <textarea id="desc" placeholder="Description"></textarea>
  <input type="text" id="image" placeholder="Image URL">
  <button onclick="addProperty()">Submit</button>
</div>

<div class="grid" id="property-list"></div>

<script>

let properties = [
  {
    city: "Delhi",
    price: "₹25,00,000",
    desc: "2BHK Flat",
    image: "https://via.placeholder.com/300"
  },
  {
    city: "Agra",
    price: "₹15,00,000",
    desc: "1BHK House",
    image: "https://via.placeholder.com/300"
  }
];

function displayProperties(data) {
  let list = document.getElementById("property-list");
  list.innerHTML = "";

  data.forEach(p => {
    list.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div class="card-body">
          <div class="price">${p.price}</div>
          <div>${p.desc}</div>
          <div>${p.city}</div>
          <a class="btn" href="tel:9999999999">Call</a>
        </div>
      </div>
    `;
  });
}

displayProperties(properties);

function showForm() {
  document.getElementById("form").style.display = "block";
}

function addProperty() {
  let newProp = {
    city: document.getElementById("city").value,
    price: document.getElementById("price").value,
    desc: document.getElementById("desc").value,
    image: document.getElementById("image").value || "https://via.placeholder.com/300"
  };

  properties.push(newProp);
  displayProperties(properties);
  alert("Property Added!");
}

document.getElementById("search").addEventListener("input", function() {
  let value = this.value.toLowerCase();
  let filtered = properties.filter(p => p.city.toLowerCase().includes(value));
  displayProperties(filtered);
});

</script>

</body>
</html>
